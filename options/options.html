<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<link rel="stylesheet" href="../app.css" />
	<style>
		body {
			padding: 20px;
			max-width: 600px;
			margin: 0 auto;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
		}
		.section {
			background: #f5f5f5;
			padding: 15px;
			border-radius: 8px;
			margin-bottom: 15px;
		}
		.section-title {
			font-size: 16px;
			font-weight: 600;
			margin-bottom: 10px;
			color: #333;
		}
		.form-group {
			margin-bottom: 12px;
		}
		.form-group:last-child {
			margin-bottom: 0;
		}
		label {
			display: block;
			font-size: 13px;
			margin-bottom: 5px;
			color: #555;
		}
		input, select {
			width: 100%;
			padding: 8px;
			border: 1px solid #ddd;
			border-radius: 4px;
			font-size: 13px;
		}
		.slider-group {
			display: flex;
			align-items: center;
			gap: 10px;
		}
		.slider-group input[type="range"] {
			flex: 1;
		}
		.slider-value {
			min-width: 40px;
			text-align: right;
			font-size: 13px;
			color: #666;
		}
		.preview-box {
			background: white;
			border: 1px solid #ddd;
			border-radius: 4px;
			padding: 10px;
			margin-top: 10px;
			text-align: center;
		}
		#tooltipPreview {
			display: inline-block;
			background: rgba(0, 0, 0, 0.9);
			color: white;
			padding: 8px 12px;
			border-radius: 6px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
		}
		.save-btn {
			width: 100%;
			padding: 12px;
			background: #4CAF50;
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
			margin-top: 15px;
		}
		.save-btn:hover {
			background: #45a049;
		}
		.save-btn:disabled {
			background: #ccc;
			cursor: not-allowed;
		}
		.info-text {
			font-size: 12px;
			color: #666;
			text-align: center;
			margin-top: 10px;
		}
		.links {
			text-align: center;
			margin-top: 20px;
			font-size: 12px;
		}
		.links a {
			color: #1976d2;
			text-decoration: none;
			margin: 0 10px;
		}
	</style>
</head>
<body>
	<h2 style="text-align: center; margin-bottom: 20px;">LibreTranslate Ayarları</h2>
	
	<form id="settings">
		<!-- API Ayarları -->
		<div class="section">
			<div class="section-title">🌐 API Ayarları</div>
			<div class="form-group">
				<label for="instance">API Adresi</label>
				<input id="instance" type="url" placeholder="https://libretranslate.com" />
			</div>
			<div class="form-group">
				<label for="apiKey">API Anahtarı (Opsiyonel)</label>
				<input id="apiKey" type="text" placeholder="Boş bırakabilirsiniz" />
			</div>
		</div>

		<!-- Dil Ayarları -->
		<div class="section">
			<div class="section-title">🌍 Varsayılan Diller</div>
			<div class="form-group">
				<label for="defTargetLg">Çeviri Dili (Tooltip için)</label>
				<select id="defTargetLg">
					<option value="tr">Türkçe</option>
					<option value="en">English</option>
					<option value="ar">Arabic</option>
					<option value="de">German</option>
					<option value="es">Spanish</option>
					<option value="fr">French</option>
					<option value="it">Italian</option>
					<option value="ja">Japanese</option>
					<option value="ko">Korean</option>
					<option value="pt">Portuguese</option>
					<option value="ru">Russian</option>
					<option value="zh">Chinese</option>
				</select>
			</div>
		</div>

		<!-- Tooltip Görünüm Ayarları -->
		<div class="section">
			<div class="section-title">💬 Tooltip Görünümü</div>
			
			<div class="form-group">
				<label for="tooltipFontSize">Yazı Boyutu: <span id="tooltipFontSizeValue">14</span>px</label>
				<div class="slider-group">
					<input id="tooltipFontSize" type="range" min="10" max="20" value="14" />
				</div>
			</div>

			<div class="form-group">
				<label for="tooltipMaxWidth">Maksimum Genişlik: <span id="tooltipMaxWidthValue">300</span>px</label>
				<div class="slider-group">
					<input id="tooltipMaxWidth" type="range" min="200" max="500" value="300" />
				</div>
			</div>

			<div class="form-group">
				<label for="tooltipOpacity">Şeffaflık: <span id="tooltipOpacityValue">90</span>%</label>
				<div class="slider-group">
					<input id="tooltipOpacity" type="range" min="70" max="100" value="90" />
				</div>
			</div>

			<div class="form-group">
				<label for="tooltipDuration">Ekranda Kalma Süresi: <span id="tooltipDurationValue">10</span> saniye</label>
				<div class="slider-group">
					<input id="tooltipDuration" type="range" min="3" max="30" value="10" />
				</div>
			</div>

			<div class="preview-box">
				<div id="tooltipPreview">Örnek çeviri metni</div>
			</div>
		</div>

		<div class="info-text">
			💡 İpucu: Herhangi bir metni seçtiğinizde otomatik çeviri yapılır<br>
			⌨️ Kısayol: Alt+T ile seçili metni çevir
		</div>

		<button id="saveBtn" type="submit" class="save-btn">Kaydet</button>
	</form>

	<div class="links">
		<a href="https://github.com/mesutcakir/LibreTranslate-OnSelect" target="_blank">GitHub</a>
		<a href="https://libretranslate.com" target="_blank">LibreTranslate</a>
	</div>

	<script src="options.js"></script>
</body>
</html>
